<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script>
    if (localStorage.getItem('tetris-theme') === 'light') {
      document.body.classList.add('light');
    }
  </script>
  <div class="wrapper">
    <div class="title-bar">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">🌙</button>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records">
          <span class="label">RECORDS</span>
          <ol id="records-list" class="records-list"></ol>
          <div class="records-stats">
            <div><span class="label">MEJOR COMBO</span> <span class="value small" id="best-combo">0</span></div>
            <div><span class="label">MÁX. LÍNEAS</span> <span class="value small" id="best-lines">0</span></div>
          </div>
          <button id="reset-records-btn" type="button">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="new-record-msg" class="new-record-msg hidden">¡Nuevo récord!</p>
        <div id="name-entry" class="name-entry hidden">
          <input id="name-input" type="text" maxlength="12" placeholder="Tu nombre" />
          <button id="save-score-btn" type="button">Guardar</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
